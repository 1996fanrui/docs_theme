name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Target project'
        required: true
        default: 'agents-sandbox'
        type: choice
        options:
          - agents-sandbox
      deploy_type:
        description: 'Deploy type'
        required: true
        default: 'docs'
        type: choice
        options:
          - docs
          - website
      target_repo_branch:
        description: 'Target project branch'
        required: true
        default: 'main'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs_theme
        uses: actions/checkout@v4

      - name: Checkout target project
        uses: actions/checkout@v4
        with:
          repository: 1996fanrui/${{ inputs.project }}
          ref: ${{ inputs.target_repo_branch }}
          path: .target-repo

      - name: Read deploy config
        id: config
        run: |
          if [ "${{ inputs.deploy_type }}" = "docs" ]; then
            CONFIG_FILE=".target-repo/docs/theme.json"
          else
            CONFIG_FILE=".target-repo/website/site.json"
          fi
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Error: $CONFIG_FILE not found"
            exit 1
          fi
          CF_PROJECT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$CONFIG_FILE','utf8')).cfPagesProject)")
          echo "cf_project=$CF_PROJECT" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: inputs.deploy_type == 'docs'
        run: pnpm install

      - name: Build docs
        if: inputs.deploy_type == 'docs'
        run: ./scripts/build.sh ${{ inputs.project }} .target-repo

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy
            ${{ inputs.deploy_type == 'docs'
                && format('.docs-src/{0}/.vitepress/dist', inputs.project)
                || '.target-repo/website' }}
            --project-name=${{ steps.config.outputs.cf_project }}
